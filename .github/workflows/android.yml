name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Criar APK simples
        run: |
          mkdir -p output
          echo "APK OK" > output/app.apk

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: apk
          path: output/app.apk      
