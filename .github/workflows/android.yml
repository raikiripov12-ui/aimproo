- name: Substituir código pelo AimPro
  run: |
    mkdir -p app/app/src/main/java/com/aim/pro

    # APAGA activity antiga
    rm -rf app/app/src/main/java

    mkdir -p app/app/src/main/java/com/aim/pro

    cat <<EOF > app/app/src/main/java/com/aim/pro/MainActivity.kt
    package com.aim.pro

    import android.os.Bundle
    import android.view.MotionEvent
    import android.widget.TextView
    import androidx.appcompat.app.AppCompatActivity

    class MainActivity : AppCompatActivity() {

        private var lastX = 0f
        private var lastY = 0f

        override fun onCreate(savedInstanceState: Bundle?) {
            super.onCreate(savedInstanceState)

            val tv = TextView(this)
            tv.text = "AimPro REAL 🎯🔥"
            tv.textSize = 24f

            setContentView(tv)
        }

        override fun onTouchEvent(event: MotionEvent): Boolean {

            val dx = event.x - lastX
            val dy = event.y - lastY

            val velocity = Math.sqrt((dx*dx + dy*dy).toDouble()).toFloat()

            val factor = when {
                velocity > 30 -> 0.2f
                velocity < 5 -> 0.8f
                else -> 0.5f
            }

            lastX = event.x
            lastY = event.y

            return true
        }
    }
    EOF

    # Corrige o AndroidManifest
    cat <<EOF > app/app/src/main/AndroidManifest.xml
    <manifest xmlns:android="http://schemas.android.com/apk/res/android"
        package="com.aim.pro">

        <application android:label="AimPro">
            <activity android:name=".MainActivity">
                <intent-filter>
                    <action android:name="android.intent.action.MAIN"/>
                    <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
            </activity>
        </application>
    </manifest>
    EOF
